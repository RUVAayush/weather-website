<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="weather-card">
            <h1 class="title">Weather App</h1>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter City">
                <button id="searchBtn">Search</button>
                <button id="locationBtn">📍</button>
            </div>
            <div id="loading" class="loading">Loading...</div>
            <p id="errorMessage"></p>
            <div class="weather-body">
                <h2 id="cityName">City Name</h2>
                <img id="weatherIcon" src="" alt="Weather Icon">
                <h1 id="temperature">-- °C</h1>
                <div class="temp-range">
                    <span id="minTemp">Min : --</span>
                    <span id="maxTemp">Max : --</span>
                </div>
                <h3 id="description">Description</h3>
                <div class="time-info">
                    <p id="date"></p>
                    <p id="localTime"></p>
                </div>
                <div class="details">
                    <div>
                        <h5>Sunrise</h5>
                        <p id="sunrise">--</p>
                    </div>
                    <div>
                        <h5>Sunset</h5>
                        <p id="sunset">--</p>
                    </div>
                    <div>
                        <h5>Feels Like</h5>
                        <p id="feelsLike">--</p>
                    </div>
                    <div>
                        <h5>Humidity</h5>
                        <p id="humidity">--</p>
                    </div>
                    <div>
                        <h5>Wind</h5>
                        <p id="wind">--</p>
                    </div>
                    <div>
                        <h5>Pressure</h5>
                        <p id="pressure">--</p>
                    </div>
                    <div>
                        <h5>Visibility</h5>
                        <p id="visibility">--</p>
                    </div>
                    <div>
                        <h5>Country</h5>
                        <p id="country">--</p>
                    </div>
                </div>
            </div>
            <div class="history">
                <h3>Recent Searches</h3>
                <ul id="historyList"></ul>
            </div>
            <div class="forecast-section">
                <h2>Next 24 Hours</h2>
                <div id="hourlyForecast" class="hourly-container"></div>
            </div>
            <div class="forecast-section">
                <h2>5 Day Forecast</h2>
                <div id="dailyForecast" class="daily-container"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
